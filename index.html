<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reactor Scheduler</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <div class="brandline"><span class="brand-dot"></span><span>Advanced Materials Operations</span></div>
          <h1>Reactor Scheduler</h1>
          <p>Batch capacity, committed backlog, and due-date fit checks for R1/R2.</p>
        </div>
        <div class="backup-controls">
          <button id="exportBtn" type="button">Export JSON</button>
          <label class="file-btn">Import JSON<input id="importFile" type="file" accept="application/json"></label>
        </div>
      </header>

      <section class="readout" id="readout"></section>

      <section class="workspace-grid">
        <form id="orderForm" class="panel">
          <h2>Add Order</h2>
          <div class="form-grid">
            <label>Customer<input name="customer" required></label>
            <label>Product Code<input name="productCode"></label>
            <label>Family<select name="family"><option>HBS</option><option>HBR</option></select></label>
            <label>Size<input name="size" type="number" step="0.1" required value="15"></label>
            <label>Qty Bags<input name="quantityBags" type="number" min="1" required value="52"></label>
            <label>Trucks<input name="trucks" type="number" min="0" step="0.25"></label>
            <label>Grade<select name="grade"><option value="standard">standard</option><option value="ESD">ESD</option></select></label>
            <label>Color<select name="color"><option>white</option><option>black</option><option>green</option><option>yellow</option></select></label>
            <label>Due Date<input name="dueDate" type="datetime-local" required></label>
          </div>
          <div class="actions">
            <button type="submit">Commit Order</button>
            <button id="checkBtn" type="button">Will It Fit?</button>
          </div>
          <div id="fitResult" class="result"></div>
        </form>

        <form id="upsizeForm" class="panel">
          <h2>Upsize Check</h2>
          <div class="form-grid compact">
            <label>Existing Order<select name="orderId" id="upsizeOrder"></select></label>
            <label>New Bag Count<input name="newBags" type="number" min="1" value="104"></label>
          </div>
          <button type="submit">Check Upsize</button>
          <div id="upsizeResult" class="result"></div>
        </form>
      </section>

      <section class="panel timeline-panel">
        <div class="section-head">
          <h2>Committed Schedule</h2>
          <div class="legend">
            <span><i class="swatch needed"></i>Needs made</span>
            <span><i class="swatch white"></i>White bead</span>
            <span><i class="swatch loaded"></i>Loaded</span>
            <span><i class="swatch dark"></i>Dark/gap</span>
          </div>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>

      <section class="workspace-grid bottom">
        <section class="panel">
          <h2>Backlog</h2>
          <div id="ordersTable" class="table-wrap"></div>
        </section>

        <section class="panel">
          <h2>Settings</h2>
          <form id="settingsForm" class="settings-form"></form>
        </section>
      </section>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
